<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Journal" />
  <meta name="theme-color" content="#0d0c0a" />
  <link rel="manifest" href="./manifest.json" />
  <title>Daily Journal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0c0a; --surface: #131210; --border: #1e1c18; --border-mid: #2a2820;
      --text: #e8e2d9; --text-dim: #8a8278; --text-muted: #5a5450; --text-faint: #3a3830;
      --gold: #c9a96e; --gold-dim: #7a6040; --gold-bg: #1a1712;
      --blue: #7ab8c9; --blue-dim: #3a6878; --blue-bg: #121618;
      --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Helvetica Neue', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    #app { min-height: 100vh; }

    #offline-banner { display: none; position: fixed; top: 0; left: 0; right: 0; background: #2a2010; border-bottom: 1px solid #4a3818; color: var(--gold); font-size: 12px; text-align: center; padding: calc(var(--safe-top) + 8px) 8px 8px; z-index: 100; letter-spacing: 0.06em; }
    body.offline #offline-banner { display: block; }

    .header { position: sticky; top: 0; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 20; padding: calc(var(--safe-top) + 14px) 16px 14px; }
    .header-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }

    .pill-group { display: flex; gap: 2px; background: var(--surface); border-radius: 8px; padding: 3px; }
    .pill-btn { background: transparent; border: 1px solid transparent; color: var(--text-muted); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; letter-spacing: 0.05em; transition: all 0.2s; font-family: inherit; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
    .pill-btn.active-personal { background: var(--gold-bg); border-color: var(--gold-dim); color: var(--gold); }
    .pill-btn.active-professional { background: var(--blue-bg); border-color: var(--blue-dim); color: var(--blue); }
    .pill-btn.active-view-personal { color: var(--gold); background: #1e1c18; }
    .pill-btn.active-view-professional { color: var(--blue); background: #1e1c18; }

    .stats { display: flex; gap: 18px; align-items: center; }
    .stat { text-align: center; }
    .stat-value { font-size: 19px; color: var(--text); line-height: 1; }
    .stat-value.gold { color: var(--gold); }
    .stat-value.blue { color: var(--blue); }
    .stat-label { font-size: 9px; color: var(--text-muted); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 3px; }

    .main { max-width: 560px; margin: 0 auto; padding: 28px 18px calc(40px + var(--safe-bottom)); }
    .date-line { font-size: 12px; color: var(--text-muted); margin-bottom: 32px; letter-spacing: 0.04em; }
    .date-line span.gold { color: var(--gold-dim); }
    .date-line span.blue { color: var(--blue-dim); }

    .field { margin-bottom: 32px; }
    .field-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .field-dot { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--border-mid); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.25s; font-size: 10px; color: var(--text-faint); }
    .field-dot.done { border: none; font-size: 11px; color: var(--bg); }
    .field-dot.c-happened-personal { background: #7a9060; }
    .field-dot.c-mind-personal { background: #9a8060; }
    .field-dot.c-priority-personal { background: var(--gold); }
    .field-dot.c-happened-professional { background: #5090a0; }
    .field-dot.c-mind-professional { background: #6070a0; }
    .field-dot.c-priority-professional { background: var(--blue); }
    .field-label { font-size: 12px; color: var(--text-muted); letter-spacing: 0.03em; }
    .field-label.filled { color: #706860; }
    .field-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-size: 17px; font-family: Georgia, serif; line-height: 1.75; padding: 8px 0; resize: none; outline: none; transition: border-color 0.2s; display: block; -webkit-appearance: none; }
    .field-input::placeholder { color: var(--text-faint); font-style: italic; font-size: 15px; }
    .field-input:focus { border-bottom-color: var(--gold); }
    .field-input.professional:focus { border-bottom-color: var(--blue); }
    .field-input.filled { border-bottom-color: #302e28; }

    .save-row { display: flex; align-items: center; gap: 16px; margin-top: 8px; }
    .save-btn { border: none; padding: 12px 28px; border-radius: 6px; font-size: 13px; letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s; font-family: inherit; -webkit-tap-highlight-color: transparent; }
    .save-btn.ready-personal { background: var(--gold); color: var(--bg); }
    .save-btn.ready-professional { background: var(--blue); color: var(--bg); }
    .save-btn.not-ready { background: var(--surface); color: var(--text-faint); cursor: default; }
    .saved-msg { font-size: 13px; color: #6a8858; }

    .history-item { margin-bottom: 28px; padding-bottom: 28px; border-bottom: 1px solid var(--border); }
    .history-date { font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 12px; }
    .history-line { display: flex; gap: 12px; margin-bottom: 9px; }
    .history-tag { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; min-width: 56px; padding-top: 3px; flex-shrink: 0; }
    .history-text { font-size: 14px; color: #c0b8a8; line-height: 1.65; font-family: Georgia, serif; }

    .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .week-nav-btn { background: none; border: 1px solid var(--border-mid); color: var(--text-dim); padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; -webkit-tap-highlight-color: transparent; }
    .week-nav-btn:disabled { color: var(--text-faint); border-color: var(--border); cursor: default; }
    .week-label { text-align: center; }
    .week-label-main { font-size: 13px; color: var(--text); }
    .week-label-sub { font-size: 11px; margin-top: 2px; }
    .day-dots { display: flex; gap: 5px; margin-bottom: 32px; justify-content: center; }
    .day-dot-wrap { text-align: center; }
    .day-dot { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; margin-bottom: 4px; background: var(--surface); border: 1px solid var(--border-mid); color: var(--text-faint); }
    .day-dot.filled-personal { background: var(--gold); border: none; color: var(--bg); }
    .day-dot.filled-professional { background: var(--blue); border: none; color: var(--bg); }
    .day-letter { font-size: 9px; color: var(--text-faint); letter-spacing: 0.05em; }
    .digest-btn { width: 100%; padding: 13px; border-radius: 8px; font-size: 13px; letter-spacing: 0.06em; font-family: inherit; margin-bottom: 28px; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
    .digest-btn.personal { background: var(--gold-bg); border: 1px solid var(--gold-dim); color: var(--gold); }
    .digest-btn.professional { background: var(--blue-bg); border: 1px solid var(--blue-dim); color: var(--blue); }
    .digest-btn.loading, .digest-btn.offline-disabled { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); cursor: default; }
    .digest-result { border-top: 1px solid var(--border); padding-top: 28px; }
    .digest-header { font-size: 10px; letter-spacing: 0.18em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 24px; }
    .digest-section { margin-bottom: 24px; }
    .digest-section-title { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #6a6458; margin-bottom: 8px; }
    .digest-section-body { font-size: 14px; color: #c8c0b0; line-height: 1.85; font-family: Georgia, serif; }
    .empty-state { text-align: center; color: var(--text-faint); font-size: 14px; padding-top: 60px; font-family: Georgia, serif; font-style: italic; }
    .offline-note { margin-top: 16px; padding: 14px 16px; background: #1a1610; border: 1px solid #3a3018; border-radius: 8px; font-size: 12px; color: #8a7850; line-height: 1.6; text-align: center; }

    /* Debug panel */
    .debug-panel { margin-top: 40px; border-top: 1px dashed #2a2820; padding-top: 24px; }
    .debug-title { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #4a4440; margin-bottom: 16px; }
    .debug-info { font-size: 12px; color: #6a6458; line-height: 1.8; font-family: 'Courier New', monospace; background: var(--surface); padding: 12px; border-radius: 6px; margin-bottom: 16px; word-break: break-all; }
    .debug-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .debug-btn { background: none; border: 1px solid #2a2820; color: #6a6458; padding: 7px 14px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: inherit; letter-spacing: 0.04em; -webkit-tap-highlight-color: transparent; }
    .debug-btn.danger { border-color: #4a2020; color: #9a5050; }
    .debug-input { background: var(--surface); border: 1px solid var(--border-mid); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 12px; font-family: inherit; outline: none; width: 160px; }
    .debug-msg { font-size: 11px; color: #6a8858; margin-top: 6px; letter-spacing: 0.03em; }
  </style>
</head>
<body>
  <div id="offline-banner">✈ Offline — journaling works, digest needs connection</div>
  <div id="app"></div>

  <script>
    const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const SHORT_MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const TYPES = {
      personal: {
        label: "Personal",
        prompts: {
          happened: ["One thing that happened today","A moment worth remembering","Something that stood out"],
          mind:     ["One thing on your mind right now","What's weighing on you","Something you're thinking about"],
          priority: ["Your top priority for tomorrow","One thing that matters most tomorrow","What you'll focus on tomorrow"],
        }
      },
      professional: {
        label: "Professional",
        prompts: {
          happened: ["One work win or challenge today","Something notable at work","A key thing that happened professionally"],
          mind:     ["One work thing on your mind","A problem you're turning over","Something unresolved at work"],
          priority: ["Your top work priority tomorrow","The one task that moves things forward","What you must get done tomorrow"],
        }
      }
    };

    // ── Helpers ───────────────────────────────────────────────────────────────
    function todayKey() {
      const d = new Date();
      return dateKey(d);
    }
    function dateKey(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function fmtDate(key) {
      const [y,m,d] = key.split('-').map(Number);
      const dt = new Date(y, m-1, d);
      return `${DAYS[dt.getDay()]}, ${d} ${SHORT_MONTHS[m-1]} ${y}`;
    }
    function weekStart(offset=0) {
      const d = new Date();
      d.setDate(d.getDate() - d.getDay() - offset*7);
      return dateKey(d);
    }
    function weekKeys(ws) {
      const [y,m,d] = ws.split('-').map(Number);
      return Array.from({length:7}, (_,i) => { const dt = new Date(y,m-1,d+i); return dateKey(dt); });
    }
    function weekLabel(ws) {
      const [y,m,d] = ws.split('-').map(Number);
      const end = new Date(y,m-1,d+6);
      return `${d} ${SHORT_MONTHS[m-1]} – ${end.getDate()} ${SHORT_MONTHS[end.getMonth()]}`;
    }
    function hasEntry(e) { return e && (e.happened||e.mind||e.priority); }
    function getPrompt(type, field, key) {
      const arr = TYPES[type].prompts[field];
      const hash = key.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
      return arr[hash % arr.length];
    }
    function calcStreak(entries) {
      let s = 0;
      const today = new Date();
      for (let i=0; i<365; i++) {
        const dt = new Date(today); dt.setDate(dt.getDate()-i);
        const k = dateKey(dt);
        if (hasEntry(entries[k])) s++; else break;
      }
      return s;
    }

    // ── Storage (IndexedDB with localStorage fallback) ─────────────────────
    const DB_NAME = 'journal_db', DB_VERSION = 1, STORE = 'data';
    let db = null;

    function openDB() {
      return new Promise((resolve, reject) => {
        if (db) { resolve(db); return; }
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
        req.onsuccess = e => { db = e.target.result; resolve(db); };
        req.onerror = () => reject(req.error);
      });
    }
    async function dbGet(key) {
      try {
        const d = await openDB();
        return new Promise((res, rej) => {
          const tx = d.transaction(STORE, 'readonly');
          const req = tx.objectStore(STORE).get(key);
          req.onsuccess = () => res(req.result);
          req.onerror = () => rej(req.error);
        });
      } catch { return localStorage.getItem(key) ? JSON.parse(localStorage.getItem(key)) : undefined; }
    }
    async function dbSet(key, val) {
      try {
        const d = await openDB();
        return new Promise((res, rej) => {
          const tx = d.transaction(STORE, 'readwrite');
          const req = tx.objectStore(STORE).put(val, key);
          req.onsuccess = () => res();
          req.onerror = () => rej(req.error);
        });
      } catch { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }
    }
    async function dbDel(key) {
      try {
        const d = await openDB();
        return new Promise((res, rej) => {
          const tx = d.transaction(STORE, 'readwrite');
          const req = tx.objectStore(STORE).delete(key);
          req.onsuccess = () => res();
          req.onerror = () => rej(req.error);
        });
      } catch { localStorage.removeItem(key); }
    }

    // ── State ─────────────────────────────────────────────────────────────────
    let state = {
      type: 'personal', view: 'today',
      today: todayKey(),
      entries: { personal:{}, professional:{} },
      digests: { personal:{}, professional:{} },
      weekOffset: 0,
      digestLoading: false,
      saved: false,
      offline: !navigator.onLine,
      debugOpen: false,
      debugMsg: '',
      debugDateInput: '',
    };

    async function loadState() {
      const entries = await dbGet('jrnl_entries');
      const digests = await dbGet('jrnl_digests');
      if (entries) state.entries = entries;
      if (digests) state.digests = digests;
      render();
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function render() {
      const s = state;
      const entries = s.entries[s.type];
      const todayEntry = entries[s.today] || {happened:'',mind:'',priority:''};
      const str = calcStreak(entries);
      const total = Object.keys(entries).filter(k=>hasEntry(entries[k])).length;
      const ws = weekStart(s.weekOffset);
      const wkeys = weekKeys(ws);
      const weekCount = wkeys.filter(k=>hasEntry(entries[k])).length;
      const currentDigest = s.digests[s.type]?.[ws];
      const todayFilled = todayEntry.happened||todayEntry.mind||todayEntry.priority;
      const historyKeys = Object.keys(entries).filter(k=>k!==s.today&&hasEntry(entries[k])).sort((a,b)=>b.localeCompare(a)).slice(0,30);
      const tagColors = {
        personal:     {happened:'#7a9060',mind:'#9a8060',priority:'#c9a96e'},
        professional: {happened:'#5090a0',mind:'#6070a0',priority:'#7ab8c9'},
      }[s.type];

      document.body.classList.toggle('offline', s.offline);

      document.getElementById('app').innerHTML = `
        <div class="header">
          <div class="header-row">
            <div class="pill-group">
              <button class="pill-btn ${s.type==='personal'?'active-personal':''}" onclick="setType('personal')">Personal</button>
              <button class="pill-btn ${s.type==='professional'?'active-professional':''}" onclick="setType('professional')">Professional</button>
            </div>
            <div class="stats">
              <div class="stat">
                <div class="stat-value ${str>0?(s.type==='personal'?'gold':'blue'):''}">${str>0?str+'d':'—'}</div>
                <div class="stat-label">streak</div>
              </div>
              <div class="stat">
                <div class="stat-value">${total||'—'}</div>
                <div class="stat-label">entries</div>
              </div>
            </div>
            <div class="pill-group">
              ${['today','history','digest'].map(v=>`<button class="pill-btn ${s.view===v?'active-view-'+s.type:''}" onclick="setView('${v}')">${v}</button>`).join('')}
            </div>
          </div>
        </div>
        <div class="main">
          ${s.view==='today' ? renderToday(todayEntry, todayFilled) : ''}
          ${s.view==='history' ? renderHistory(historyKeys, entries, tagColors, total) : ''}
          ${s.view==='digest' ? renderDigest(wkeys, ws, weekCount, currentDigest, entries) : ''}
          ${s.view==='today' ? renderDebug(str, total, s) : ''}
        </div>
      `;

      document.querySelectorAll('.field-input').forEach(ta => {
        ta.style.height = 'auto';
        ta.style.height = ta.scrollHeight + 'px';
        ta.addEventListener('input', function() { this.style.height='auto'; this.style.height=this.scrollHeight+'px'; });
      });
    }

    function renderToday(entry, filled) {
      const s = state;
      const fields = ['happened','mind','priority'];
      return `
        <div class="date-line">${fmtDate(s.today)} · <span class="${s.type==='professional'?'blue':'gold'}">${TYPES[s.type].label}</span></div>
        ${fields.map((f,i)=>`
          <div class="field">
            <div class="field-header">
              <div class="field-dot ${entry[f]?'done c-'+f+'-'+s.type:''}">${entry[f]?'✓':(i+1)}</div>
              <div class="field-label ${entry[f]?'filled':''}">${getPrompt(s.type,f,s.today)}</div>
            </div>
            <textarea class="field-input ${s.type} ${entry[f]?'filled':''}" placeholder="Write anything…" rows="2" oninput="updateField('${f}',this.value)">${entry[f]||''}</textarea>
          </div>
        `).join('')}
        <div class="save-row">
          <button class="save-btn ${filled?'ready-'+s.type:'not-ready'}" onclick="${filled?'saveEntry()':''}">${s.saved?'Saved ✓':'Save entry'}</button>
        </div>
      `;
    }

    function renderHistory(keys, entries, tagColors, total) {
      if (!keys.length) return `<div class="empty-state">No past entries yet.<br>Write today's first.</div>`;
      return `
        <div class="date-line">${TYPES[state.type].label} · ${total} ${total===1?'entry':'entries'}</div>
        ${keys.map(k=>{
          const e=entries[k];
          return `<div class="history-item">
            <div class="history-date">${fmtDate(k)}</div>
            ${e.happened?`<div class="history-line"><span class="history-tag" style="color:${tagColors.happened}">happened</span><span class="history-text">${e.happened}</span></div>`:''}
            ${e.mind?`<div class="history-line"><span class="history-tag" style="color:${tagColors.mind}">mind</span><span class="history-text">${e.mind}</span></div>`:''}
            ${e.priority?`<div class="history-line"><span class="history-tag" style="color:${tagColors.priority}">priority</span><span class="history-text">${e.priority}</span></div>`:''}
          </div>`;
        }).join('')}
      `;
    }

    function renderDigest(wkeys, ws, weekCount, currentDigest, entries) {
      const s = state;
      const dots = wkeys.map(k=>{
        const [,,d]=k.split('-').map(Number);
        const filled=hasEntry(entries[k]);
        return `<div class="day-dot-wrap">
          <div class="day-dot ${filled?'filled-'+s.type:''}">${d}</div>
          <div class="day-letter">${DAYS[new Date(k).getDay()][0]}</div>
        </div>`;
      }).join('');
      const sections = parseDigest(currentDigest);
      return `
        <div class="week-nav">
          <button class="week-nav-btn" onclick="shiftWeek(1)">← Prev</button>
          <div class="week-label">
            <div class="week-label-main">${weekLabel(ws)}</div>
            <div class="week-label-sub" style="color:${s.type==='personal'?'var(--gold-dim)':'var(--blue-dim)'}">${weekCount}/7 entries</div>
          </div>
          <button class="week-nav-btn" ${s.weekOffset===0?'disabled':''} onclick="shiftWeek(-1)">This week</button>
        </div>
        <div class="day-dots">${dots}</div>
        ${!weekCount ? `<div class="empty-state">No entries this week yet.</div>` : `
          ${s.offline&&!currentDigest ? `<div class="offline-note">✈ Digest generation needs a connection.<br>Your entries are safe and ready when you're back online.</div>` : ''}
          ${!s.offline||currentDigest ? `
            <button class="digest-btn ${s.digestLoading?'loading':s.type}" onclick="${s.digestLoading?'':'generateDigest()'}">
              ${s.digestLoading?'Generating…':currentDigest?'Regenerate digest':'Generate '+TYPES[s.type].label+' digest'}
            </button>
          ` : ''}
          ${currentDigest&&!s.digestLoading ? `
            <div class="digest-result">
              <div class="digest-header">${TYPES[s.type].label} · ${weekLabel(ws)}</div>
              ${sections.length
                ? sections.map(sec=>`<div class="digest-section"><div class="digest-section-title">${sec.label}</div><div class="digest-section-body">${sec.content}</div></div>`).join('')
                : `<div class="digest-section-body">${currentDigest}</div>`}
            </div>
          ` : ''}
        `}
      `;
    }

    function renderDebug(str, total, s) {
      const toggleLabel = s.debugOpen ? 'Hide debug panel' : 'Debug panel';
      if (!s.debugOpen) return `
        <div style="margin-top:48px;text-align:center;">
          <button class="debug-btn" onclick="toggleDebug()" style="font-size:10px;opacity:0.4;">${toggleLabel}</button>
        </div>`;

      const entries = s.entries[s.type];
      const recentKeys = Object.keys(entries).filter(k=>hasEntry(entries[k])).sort((a,b)=>b.localeCompare(a)).slice(0,5);
      const storageInfo = `Type: ${s.type}\nStreak: ${str}\nTotal entries: ${total}\nRecent keys: ${recentKeys.join(', ')||'none'}\nStorage: IndexedDB`;

      return `
        <div class="debug-panel">
          <div class="debug-title">🛠 Debug Panel</div>
          <div class="debug-info">${storageInfo.replace(/\n/g,'<br>')}</div>

          <div style="font-size:11px;color:#5a5450;margin-bottom:8px;letter-spacing:0.03em;">Add backdated entry to test streak:</div>
          <div class="debug-row">
            <input class="debug-input" id="debug-date-input" type="date" value="${s.debugDateInput}" oninput="state.debugDateInput=this.value" placeholder="YYYY-MM-DD" />
            <button class="debug-btn" onclick="addBackdatedEntry()">Add entry</button>
          </div>
          ${s.debugMsg ? `<div class="debug-msg">${s.debugMsg}</div>` : ''}

          <div style="margin-top:16px;">
            <div class="debug-row">
              <button class="debug-btn danger" onclick="clearAllData()">Clear all data</button>
              <button class="debug-btn" onclick="toggleDebug()">Close panel</button>
            </div>
          </div>
        </div>
      `;
    }

    function parseDigest(text) {
      if (!text) return [];
      const sections = [
        {key:"RECURRING THEMES",label:"Recurring Themes"},
        {key:"PRIORITIES FOLLOW-THROUGH",label:"Priorities Follow-Through"},
        {key:"DOMINANT TOPICS",label:"Dominant Topics"},
        {key:"WEEKLY SUMMARY",label:"Weekly Summary"},
      ];
      return sections.map((s,i)=>{
        const start=text.indexOf(s.key+":");
        if(start===-1) return null;
        const cs=start+s.key.length+1;
        const next=sections.slice(i+1).reduce((min,ns)=>{const idx=text.indexOf(ns.key+":");return(idx!==-1&&idx<min)?idx:min;},text.length);
        return {label:s.label,content:text.slice(cs,next).trim()};
      }).filter(Boolean);
    }

    // ── Actions ───────────────────────────────────────────────────────────────
    function setType(t) { state.type=t; state.saved=false; render(); }
    function setView(v) { state.view=v; render(); }
    function shiftWeek(dir) { state.weekOffset=Math.max(0,state.weekOffset+dir); render(); }
    function toggleDebug() { state.debugOpen=!state.debugOpen; state.debugMsg=''; render(); }

    function updateField(field, value) {
      const key=state.today;
      const existing=state.entries[state.type][key]||{happened:'',mind:'',priority:''};
      state.entries[state.type][key]={...existing,[field]:value};
      state.saved=false;
      // Lightweight dot update
      const entry=state.entries[state.type][key];
      ['happened','mind','priority'].forEach((f,i)=>{
        const dot=document.querySelectorAll('.field-dot')[i];
        if(!dot) return;
        dot.className='field-dot'+(entry[f]?' done c-'+f+'-'+state.type:'');
        dot.textContent=entry[f]?'✓':(i+1);
      });
      const anyFilled=entry.happened||entry.mind||entry.priority;
      const btn=document.querySelector('.save-btn');
      if(btn){ btn.className='save-btn '+(anyFilled?'ready-'+state.type:'not-ready'); if(anyFilled) btn.setAttribute('onclick','saveEntry()'); else btn.removeAttribute('onclick'); }
    }

    async function saveEntry() {
      await dbSet('jrnl_entries', state.entries);
      state.saved=true;
      const btn=document.querySelector('.save-btn');
      if(btn) btn.textContent='Saved ✓';
    }

    async function addBackdatedEntry() {
      const input = document.getElementById('debug-date-input');
      const dateStr = input ? input.value : state.debugDateInput;
      if (!dateStr || !/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
        state.debugMsg = '⚠ Enter a valid date (YYYY-MM-DD)'; render(); return;
      }
      const existing = state.entries[state.type][dateStr];
      if (hasEntry(existing)) {
        state.debugMsg = `ℹ Entry for ${dateStr} already exists`; render(); return;
      }
      state.entries[state.type][dateStr] = { happened:'Debug test entry', mind:'Testing streak', priority:'Check streak counter' };
      await dbSet('jrnl_entries', state.entries);
      state.debugMsg = `✓ Added entry for ${dateStr} — streak updated`;
      render();
    }

    async function clearAllData() {
      if (!confirm('Delete all journal entries and digests? This cannot be undone.')) return;
      state.entries = { personal:{}, professional:{} };
      state.digests = { personal:{}, professional:{} };
      await dbSet('jrnl_entries', state.entries);
      await dbSet('jrnl_digests', state.digests);
      state.debugMsg = '✓ All data cleared';
      render();
    }

    async function generateDigest() {
      if (state.offline) return;
      state.digestLoading=true; render();
      const ws=weekStart(state.weekOffset);
      const wks=weekKeys(ws);
      const entries=state.entries[state.type];
      const weekEntries={};
      wks.forEach(k=>{if(entries[k]) weekEntries[k]=entries[k];});
      const lines=Object.entries(weekEntries).filter(([,e])=>hasEntry(e)).sort(([a],[b])=>a.localeCompare(b))
        .map(([k,e])=>`${fmtDate(k)}:\n  Happened: ${e.happened||'—'}\n  Mind: ${e.mind||'—'}\n  Priority: ${e.priority||'—'}`).join('\n\n');
      const isPersonal=state.type==='personal';
      try {
        const res=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST", headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            model:"claude-sonnet-4-20250514", max_tokens:1000,
            system: isPersonal
              ? "You are a thoughtful personal journal analyst. Be warm, insightful, and personal."
              : "You are a sharp professional journal analyst. Be clear, actionable, and strategic.",
            messages:[{role:"user",content:`Here are my ${state.type} journal entries:\n\n${lines}\n\nGenerate a weekly digest with four sections. Plain text only, no markdown. Section titles in ALL CAPS followed by a colon.\n\nRECURRING THEMES: What topics keep appearing? 2-3 sentences.\n\nPRIORITIES FOLLOW-THROUGH: Did priorities connect to what happened next day? 2-3 sentences.\n\nDOMINANT TOPICS: What took up the most mental space? 2-3 sentences.\n\nWEEKLY SUMMARY: Honest summary of this week. 3-4 sentences.`}]
          })
        });
        const data=await res.json();
        const text=data.content?.map(b=>b.text||'').join('').trim()||'';
        if(text){ if(!state.digests[state.type]) state.digests[state.type]={}; state.digests[state.type][ws]=text; await dbSet('jrnl_digests',state.digests); }
      } catch(e){ console.error(e); }
      state.digestLoading=false; render();
    }

    // ── Online/offline ────────────────────────────────────────────────────────
    window.addEventListener('online',  ()=>{ state.offline=false; render(); });
    window.addEventListener('offline', ()=>{ state.offline=true;  render(); });

    // ── Service Worker ────────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(console.error);
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    loadState();
  </script>
</body>
</html>
